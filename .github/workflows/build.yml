name: Build and Release with PyInstaller

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            slug: linux-x64
          - os: windows-latest
            slug: windows-x64
          - os: macos-latest
            slug: macos

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --name DESSiNe_ELApp \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_EL.png \
            DESSiNe_EL.py

          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --name DESSiNe_DMApp \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_DM.png \
            DESSiNe_DM.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --strip \
            --name DESSiNe_ELApp \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_EL.png \
            DESSiNe_EL.py

          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --strip \
            --name DESSiNe_DMApp \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_DM.png \
            DESSiNe_DM.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --clean --noconfirm \
            --strip \
            --name DESSiNe_ELApp \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            DESSiNe_EL.py

          python -m PyInstaller --clean --noconfirm \
            --strip \
            --name DESSiNe_DMApp \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            DESSiNe_DM.py

      - name: Package release files
        env:
          OS_SLUG: ${{ matrix.slug }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import zipfile

          dist = pathlib.Path("dist")
          out = pathlib.Path("release")
          out.mkdir(exist_ok=True)

          def zip_target(src_path: pathlib.Path, zip_path: pathlib.Path):
              with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
                  if src_path.is_dir():
                      for p in src_path.rglob("*"):
                          if p.is_file():
                              zf.write(p, p.relative_to(src_path.parent))
                  else:
                      zf.write(src_path, src_path.name)

          targets = [
              ("DESSiNe_ELApp", dist / "DESSiNe_ELApp"),
              ("DESSiNe_DMApp", dist / "DESSiNe_DMApp"),
          ]

          # macOS windowed build produces .app bundles
          if os.environ.get("RUNNER_OS") == "macOS":
              targets = [
                  ("DESSiNe_ELApp", dist / "DESSiNe_ELApp.app"),
                  ("DESSiNe_DMApp", dist / "DESSiNe_DMApp.app"),
              ]

          for app_name, src in targets:
              if not src.exists():
                  raise SystemExit(f"Expected build output not found: {src}")
              zip_name = f"{app_name}-{os.environ['OS_SLUG']}.zip"
              zip_target(src, out / zip_name)
              print(f"Created: {out / zip_name}")
          PY

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.slug }}
          path: release/*.zip

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Show downloaded files
        run: find release-assets -type f -maxdepth 3 | sort

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated build for $TAG"

          gh release upload "$TAG" release-assets/**/*.zip --clobber