name: Build Binary with PyInstaller

on:
  workflow_dispatch:
  # 等確認穩定後，再決定要不要打開這個
  # push:
  #   branches: ["main"]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --name DESSiNe_ELApp_Win \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_EL.icns \
            DESSiNe_EL.py

          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --name DESSiNe_DMApp_Win \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_DM.icns \
            DESSiNe_DM.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --strip \
            --name DESSiNe_ELApp_Mac \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_EL.icns \
            DESSiNe_EL.py

          python -m PyInstaller --clean --noconfirm \
            --windowed \
            --strip \
            --name DESSiNe_DMApp_Mac \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            --icon=DESSiNe_DM.icns \
            DESSiNe_DM.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --clean --noconfirm \
            --strip \
            --name DESSiNe_ELApp_Linux \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            DESSiNe_EL.py

          python -m PyInstaller --clean --noconfirm \
            --strip \
            --name DESSiNe_DMApp_Linux \
            --collect-all=brian2 \
            --collect-all=Cython \
            --exclude-module=tkinter \
            DESSiNe_DM.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DESSiNe-Builds-${{ matrix.os }}
          path: dist/
